<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
  <meta name="theme-color" content="#0e1116">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Iron Together">
  <title>Iron Together</title>
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="apple-touch-icon" href="icon.svg">
  <link rel="icon" href="icon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header>
    <h1>Iron <span>Together</span></h1>
    <div class="user-toggle">
      <button id="u-luke">Luke</button>
      <button id="u-kristen">Kristen</button>
    </div>
  </header>

  <main id="main"></main>

  <nav>
    <button data-view="today" class="active"><span class="icon">🏋️</span>Today</button>
    <button data-view="week"><span class="icon">📅</span>Week</button>
    <button data-view="progress"><span class="icon">📈</span>Progress</button>
    <button data-view="settings"><span class="icon">⚙️</span>More</button>
  </nav>

  <div id="toast"></div>

  <script src="js/exercises.js"></script>
  <script src="js/program.js"></script>
  <script src="js/app.js"></script>

</html>
